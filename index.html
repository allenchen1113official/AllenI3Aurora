<script type="text/babel" data-presets="react">
function App() {
  const [screen, setScreen] = React.useState("dashboard");
  const [open, setOpen] = React.useState(false);
  const go = (id) => { setScreen(id); setOpen(false); };
  const meta = {
    dashboard: { title: "儀表板", sub: window.KIT.brand.tagline, C: window.Dashboard },
    issue:     { title: "本期報報", sub: "週報 · 第 26 期 · 2026.06.29", C: window.NewsletterIssue },
    archive:   { title: "歷期彙整", sub: "日報 · 週報 · 月報", C: window.Archive },
    timeline:  { title: "個人年輪", sub: "1975 → 2026", C: window.Timeline },
    subscribe: { title: "訂閱管理", sub: "選擇你的閱讀節奏", C: window.Subscribe },
  }[screen];
  const Screen = meta.C;
  return (
    <div className={"kit-shell" + (open ? " open" : "")}>
      <div className="kit-scrim" onClick={() => setOpen(false)} />
      <div className="kit-side"><window.Sidebar active={screen} onNav={go} /></div>
      <div className="kit-main">
        <window.Topbar title={meta.title} sub={meta.sub} onMenu={() => setOpen(true)} onNav={go} />
        <div style={{ flex: 1 }}><Screen /></div>
      </div>
    </div>
  );
}
async function boot() {
  if (!window.Dashboard || !window.Subscribe || !window.Sidebar) { return setTimeout(boot, 40); }
  try { const d = window.AURORA && await window.AURORA.ready; if (d) Object.assign(window.KIT, d); } catch (e) { /* fall back to built-in data */ }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
boot();
</script>
