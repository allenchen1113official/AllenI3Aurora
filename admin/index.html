<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>艾倫報報 · 後台管理</title>
<link rel="icon" href="/AllenI3Aurora/assets/favicon-32x32.png">
<link rel="stylesheet" href="/AllenI3Aurora/styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/AllenI3Aurora/supabase-config.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  body { background: var(--night-900, #05070f); }
  #root { min-height: 100vh; min-height: 100dvh; }
  .ad-in { width: 100%; box-sizing: border-box; padding: 10px 12px; background: var(--night-800); color: var(--text-1);
           border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 14px; font-family: var(--font-body); outline: none; }
  .ad-in:focus { border-color: var(--brand); }
  textarea.ad-in { min-height: 64px; resize: vertical; font-family: var(--font-mono); }
  .ad-btn { cursor: pointer; border-radius: var(--radius-md); font-family: var(--font-display); font-weight: 700; font-size: 13.5px;
            padding: 9px 14px; border: 1px solid var(--border); background: var(--night-700); color: var(--text-1); transition: filter .15s; }
  .ad-btn:hover { filter: brightness(1.1); }
  .ad-btn.primary { background: var(--aurora-gradient); border-color: transparent; color: var(--text-on-accent); box-shadow: var(--glow-brand); }
  .ad-btn.danger  { background: transparent; border-color: var(--danger); color: var(--danger); }
  .ad-btn.ghost   { background: transparent; }
  label.ad-lbl { display: block; font-size: 11.5px; color: var(--text-3); margin: 0 0 5px; letter-spacing: .03em; font-weight: 600; }
</style>
</head>
<body class="aurora-bg">
<div id="root"></div>
<script type="text/babel" src="admin.jsx" data-presets="react"></script>
</body>
</html>
