<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { height: 100%; }
  body { margin: 0; overflow: hidden; }
  /* 100dvh follows the visible area when mobile browser chrome expands/collapses */
  #root { height: 100vh; height: 100dvh; }
  .kit-shell { display: flex; height: 100vh; height: 100dvh; overflow: hidden; }
  .kit-side { height: 100vh; height: 100dvh; overflow-y: auto; }
  .kit-main { flex: 1; height: 100vh; height: 100dvh; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; min-width: 0; }
  .kit-scrim { display: none; }
  @media (max-width: 900px) {
    .kit-side { position: fixed; left: 0; top: 0; bottom: 0; z-index: 200; width: min(var(--sidebar-w), 84vw); transform: translateX(-102%); transition: transform .28s cubic-bezier(.22,1,.36,1); box-shadow: var(--shadow-lg); }
    .kit-shell.open .kit-side { transform: translateX(0); }
    .kit-shell.open .kit-scrim { display: block; position: fixed; inset: 0; background: var(--scrim); z-index: 150; }
    .kit-menu { display: inline-flex !important; }
    .kit-search { display: none !important; }
    .kit-2col { grid-template-columns: 1fr !important; }
    /* grid items default to min-content width; without this, no-wrap text
       (e.g. podcast titles) forces the collapsed column wider than the phone screen */
    .kit-2col > * { min-width: 0; }
  }
  @media (max-width: 640px) {
    .kit-page { padding: var(--space-5) var(--space-4) var(--space-10) !important; gap: var(--space-6) !important; }
    .kit-topbar { padding: 12px var(--space-4) !important; }
    .kit-2col { gap: var(--space-5) !important; }
  }
</style>
</head>
<body class="aurora-bg">
<div id="root"></div>
<script type="text/babel" src="kit.jsx" data-presets="react"></script>
<script type="text/babel" src="Dashboard.jsx" data-presets="react"></script>
<script type="text/babel" src="NewsletterIssue.jsx" data-presets="react"></script>
<script type="text/babel" src="Archive.jsx" data-presets="react"></script>
<script type="text/babel" src="Timeline.jsx" data-presets="react"></script>
<script type="text/babel" src="Subscribe.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
function App() {
  const [screen, setScreen] = React.useState("dashboard");
  const [open, setOpen] = React.useState(false);
  const go = (id) => { setScreen(id); setOpen(false); };
  const meta = {
    dashboard: { title: "儀表板", sub: window.KIT.brand.tagline, C: window.Dashboard },
    issue:     { title: "本期報報", sub: "週報 · 第 26 期 · 2026.06.29", C: window.NewsletterIssue },
    archive:   { title: "歷期彙整", sub: "日報 · 週報 · 月報", C: window.Archive },
    timeline:  { title: "個人年輪", sub: "1975 → 2026", C: window.Timeline },
    subscribe: { title: "訂閱管理", sub: "選擇你的閱讀節奏", C: window.Subscribe },
  }[screen];
  const Screen = meta.C;
  return (
    <div className={"kit-shell" + (open ? " open" : "")}>
      <div className="kit-scrim" onClick={() => setOpen(false)} />
      <div className="kit-side"><window.Sidebar active={screen} onNav={go} /></div>
      <div className="kit-main">
        <window.Topbar title={meta.title} sub={meta.sub} onMenu={() => setOpen(true)} onNav={go} />
        <div style={{ flex: 1 }}><Screen /></div>
      </div>
    </div>
  );
}
async function boot() {
  if (!window.Dashboard || !window.Subscribe || !window.Sidebar) { return setTimeout(boot, 40); }
  try { const d = window.AURORA && await window.AURORA.ready; if (d) Object.assign(window.KIT, d); } catch (e) { /* fall back to built-in data */ }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}
boot();
</script>
</body>
</html>
