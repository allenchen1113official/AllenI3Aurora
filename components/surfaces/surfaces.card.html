<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 26px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  .callouts { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body class="aurora-bg">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const NS = window.AllenAuroraDesignSystem_e6fd5f;
const { Card, StatCard, Sparkline, SectionHeader, Callout, Badge } = NS;
const Bulb = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1h6c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z"/></svg>;
const Chart = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-4 4"/></svg>;

function Demo() {
  return (
    <div>
      <SectionHeader kicker="INSIGHT · 洞察" title="今日儀表板"
        action={<Badge tone="insight" dot>即時</Badge>} />
      <div className="stats">
        <StatCard label="加權指數" value="23,412" unit="pt" delta="+1.24%" deltaMode="finance" tone="insight"
          spark={<Sparkline data={[5,6,5.5,7,6.8,8,9]} color="var(--finance-up)" />} icon={<Chart/>} />
        <StatCard label="本月結餘" value="42,180" unit="TWD" delta={8} tone="intelligence"
          spark={<Sparkline data={[4,4.2,4.1,4.6,4.5,4.9,5.2]} color="var(--intelligence)" />} />
        <StatCard label="待讀清單" value="12" unit="篇" delta={-3} tone="illumination" />
      </div>
      <div className="cards">
        <Card accent="aurora" glow>
          <div style={{fontFamily:"var(--font-display)",fontWeight:800,color:"var(--text-1)",fontSize:"var(--text-xl)",marginBottom:6}}>週報 · 第 26 期</div>
          <p style={{color:"var(--text-3)",fontSize:"var(--text-base)",margin:0}}>洞察世界．累積智慧．點亮未來。本週彙整 8 則動態、3 檔關注個股與 2 集必聽 Podcast。</p>
        </Card>
        <Card accent="intelligence" interactive>
          <div style={{fontFamily:"var(--font-display)",fontWeight:800,color:"var(--text-1)",fontSize:"var(--text-xl)",marginBottom:6}}>個人年輪</div>
          <p style={{color:"var(--text-3)",fontSize:"var(--text-base)",margin:0}}>1975 → 2026，51 圈生命刻度。點擊展開任一年份的里程碑。</p>
        </Card>
      </div>
      <div className="callouts">
        <Callout tone="illumination" icon={<Bulb/>} title="本週啟發 Illumination">
          少即是多 — 每天主動砍掉一件不重要的事，替真正的重點騰出空間。
        </Callout>
        <Callout tone="insight" icon={<Chart/>} title="籌碼洞察">
          外資投信「雙連買」名單新增 3 檔，集中在半導體與航運類股。
        </Callout>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
