<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--night-900);display:grid;grid-template-columns:1.1fr 1fr;gap:22px;}
  .tag{font:900 23px var(--font-display);line-height:1.4;letter-spacing:.01em;}
  .tag .i1{background-image:var(--insight-gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .tag .g{background-image:var(--text-gradient);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .tag .dot{color:var(--text-4);}
  .en{font:600 13px var(--font-body);color:var(--text-3);margin-top:12px;line-height:1.7;}
  .lbl{font:700 10px/1 var(--font-body);letter-spacing:.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px;}
  ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:8px;}
  li{font:400 13px var(--font-body);color:var(--text-2);display:flex;gap:8px;}
  li b{color:var(--insight);}
</style></head>
<body>
<div>
  <div class="tag"><span class="i1">洞察世界</span><span class="dot">．</span><span class="g">累積智慧．點亮未來。</span></div>
  <div class="en">Insight the World. Intelligence the Future. Illumination the Journey.</div>
</div>
<div>
  <div class="lbl">Tone rules</div>
  <ul>
    <li><b>親切第一人稱</b>「我做了…」，像寫給朋友。</li>
    <li><b>利益先行</b>先說對讀者的價值，再談細節。</li>
    <li><b>繁中為主</b>中英混排，術語保留英文。</li>
    <li><b>克制的 emoji</b>點綴節奏，不氾濫。✨</li>
  </ul>
</div>
</body></html>
