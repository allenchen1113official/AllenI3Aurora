<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--night-900);display:flex;align-items:center;gap:30px;flex-wrap:wrap;}
  .big{font-family:var(--font-mono);font-weight:700;font-variant-numeric:tabular-nums;color:var(--text-1);font-size:34px;}
  .up{color:var(--finance-up);font:700 20px var(--font-mono);}
  .set{font:500 13px/1.9 var(--font-mono);color:var(--text-3);}
</style></head>
<body>
<div><div class="big">23,412.68</div><div class="up">▲ +287.4  (+1.24%)</div></div>
<div class="set">0123456789<br>--font-mono · JetBrains Mono<br>tabular-nums · tickers · dates · %</div>
</body></html>
