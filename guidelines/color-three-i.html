<!-- @dsCard group="Colors" viewport="700x180" name="The three I's" subtitle="Insight · Intelligence · Illumination — semantic accents" -->
<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--night-900);}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .card{border-radius:14px;padding:16px;border:1px solid var(--border);background:var(--night-800);}
  .dot{width:34px;height:34px;border-radius:10px;margin-bottom:12px;}
  .en{font:900 15px var(--font-display);color:var(--text-1);}
  .zh{font:700 13px var(--font-body);color:var(--text-3);margin-top:2px;}
  .hex{font:600 11px/1.5 var(--font-mono);color:var(--text-3);margin-top:10px;}
  .chip{display:inline-block;padding:2px 8px;border-radius:99px;font:700 10px var(--font-body);margin-top:8px;}
</style></head>
<body>
<div class="row">
  <div class="card"><div class="dot" style="background:var(--insight-gradient)"></div><div class="en">Insight</div><div class="zh">洞察 · 看清世界</div><div class="hex">--insight · #34E0A1</div><span class="chip" style="background:var(--insight-soft);color:var(--insight)">soft tint</span></div>
  <div class="card"><div class="dot" style="background:var(--intelligence-gradient)"></div><div class="en">Intelligence</div><div class="zh">智慧 · 累積脈絡</div><div class="hex">--intelligence · #8B7CF6</div><span class="chip" style="background:var(--intelligence-soft);color:var(--intelligence)">soft tint</span></div>
  <div class="card"><div class="dot" style="background:var(--illumination-gradient)"></div><div class="en">Illumination</div><div class="zh">啟發 · 點亮未來</div><div class="hex">--illumination · #FFC24B</div><span class="chip" style="background:var(--illumination-soft);color:var(--illumination)">soft tint</span></div>
</div>
</body></html>
