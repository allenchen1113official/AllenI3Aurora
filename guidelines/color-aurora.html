<!-- @dsCard group="Colors" viewport="700x190" name="Aurora — signature gradient" subtitle="The brand gradient and its spectrum stops" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--night-900);}
  .hero{height:66px;border-radius:14px;background:var(--aurora-gradient);box-shadow:var(--glow-brand);margin-bottom:14px;display:flex;align-items:center;padding-left:20px;}
  .hero span{font:900 20px var(--font-display);color:var(--text-on-accent);}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
  .sw{height:44px;border-radius:10px;}
  .name{font:700 10px/1.4 var(--font-mono);color:var(--text-3);margin-top:6px;text-align:center;}
</style></head>
<body>
<div class="hero"><span>洞察世界．累積智慧．點亮未來。</span></div>
<div class="row">
  <div><div class="sw" style="background:var(--aurora-green)"></div><div class="name">green</div></div>
  <div><div class="sw" style="background:var(--aurora-teal)"></div><div class="name">teal</div></div>
  <div><div class="sw" style="background:var(--aurora-cyan)"></div><div class="name">cyan</div></div>
  <div><div class="sw" style="background:var(--aurora-blue)"></div><div class="name">blue</div></div>
  <div><div class="sw" style="background:var(--aurora-violet)"></div><div class="name">violet</div></div>
  <div><div class="sw" style="background:var(--aurora-magenta)"></div><div class="name">magenta</div></div>
</div>
</body></html>
