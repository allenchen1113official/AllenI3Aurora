<!-- @dsCard group="Spacing" viewport="700x160" name="Radii" subtitle="Warm, rounded corners · xs → pill" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--night-900);display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
  .b{width:76px;height:76px;background:var(--night-700);border:1px solid var(--border-strong);display:grid;place-items:end center;}
  .n{font:600 10px var(--font-mono);color:var(--text-3);padding-bottom:6px;}
  .pill{width:120px;border-radius:var(--radius-pill);}
</style></head>
<body>
<div><div class="b" style="border-radius:var(--radius-xs)"><span class="n">xs 6</span></div></div>
<div><div class="b" style="border-radius:var(--radius-sm)"><span class="n">sm 10</span></div></div>
<div><div class="b" style="border-radius:var(--radius-md)"><span class="n">md 14</span></div></div>
<div><div class="b" style="border-radius:var(--radius-lg)"><span class="n">lg 18</span></div></div>
<div><div class="b" style="border-radius:var(--radius-xl)"><span class="n">xl 24</span></div></div>
<div><div class="b" style="border-radius:var(--radius-2xl)"><span class="n">2xl 32</span></div></div>
<div><div class="b pill"><span class="n">pill</span></div></div>
</body></html>
