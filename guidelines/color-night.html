<!-- @dsCard group="Colors" viewport="700x150" name="Night — surface scale" subtitle="Deep-night base surfaces, darkest → lightest" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--night-900);}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;}
  .sw{border-radius:12px;height:74px;border:1px solid var(--border-subtle);display:flex;align-items:flex-end;padding:8px;}
  .cap{font:600 10px/1.3 var(--font-mono);color:var(--text-1);text-shadow:0 1px 3px rgba(0,0,0,.6);}
  .name{font:700 10px/1.4 var(--font-body);color:var(--text-3);margin-top:6px;letter-spacing:.04em;text-align:center;}
</style></head>
<body>
<div class="row">
  <div><div class="sw" style="background:var(--night-1000)"></div><div class="name">1000</div></div>
  <div><div class="sw" style="background:var(--night-900)"></div><div class="name">900 · app</div></div>
  <div><div class="sw" style="background:var(--night-850)"></div><div class="name">850</div></div>
  <div><div class="sw" style="background:var(--night-800)"></div><div class="name">800 · card</div></div>
  <div><div class="sw" style="background:var(--night-700)"></div><div class="name">700</div></div>
  <div><div class="sw" style="background:var(--night-650)"></div><div class="name">650</div></div>
  <div><div class="sw" style="background:var(--night-600)"></div><div class="name">600</div></div>
  <div><div class="sw" style="background:var(--night-500)"></div><div class="name">500</div></div>
</div>
</body></html>
