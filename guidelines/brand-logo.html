<!-- @dsCard group="Brand" viewport="700x200" name="Logo & wordmark" subtitle="AI³A mark (Allen · Aurora) — blue-green aurora, 3-colour palette" -->
<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:#EEF7F6;display:flex;align-items:center;gap:36px;flex-wrap:wrap;}
  /* Primary mark: rounded tile, light blue-green aurora gradient, monogram A · I³ · A */
  .mark{display:inline-flex;align-items:baseline;gap:2px;height:64px;padding:0 18px;border-radius:18px;background:var(--aurora-cool-light);box-shadow:0 8px 24px -8px rgba(45,180,170,.4);font-family:var(--font-display);color:#0E6B63;}
  .mark .a{font-weight:900;font-size:34px;line-height:64px;}
  .mark .i{font-weight:900;font-size:26px;line-height:64px;letter-spacing:.02em;}
  .mark .i sup{font-size:14px;font-weight:800;}
  .lock{display:flex;align-items:center;gap:14px;}
  .lock .zh{font:900 26px var(--font-display);line-height:1.15;background-image:var(--aurora-cool-light);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:brightness(.72);}
  .lock .en{font:800 11px var(--font-body);letter-spacing:.16em;color:#5A9C95;text-transform:uppercase;margin-top:3px;}
  /* Outline treatment (single colour) */
  .mono{display:inline-flex;align-items:baseline;gap:2px;height:56px;padding:0 15px;border-radius:15px;border:2px solid #6FC7BE;font-family:var(--font-display);color:#0E6B63;}
  .mono .a{font-weight:900;font-size:28px;line-height:56px;}
  .mono .i{font-weight:900;font-size:21px;line-height:56px;}
  .mono .i sup{font-size:12px;}
</style></head>
<body>
  <div class="mark"><span class="a">A</span><span class="i">I<sup>3</sup></span><span class="a">A</span></div>
  <div class="lock">
    <div class="mark" style="height:50px;padding:0 14px;border-radius:14px"><span class="a" style="font-size:27px;line-height:50px">A</span><span class="i" style="font-size:21px;line-height:50px">I<sup style="font-size:11px">3</sup></span><span class="a" style="font-size:27px;line-height:50px">A</span></div>
    <div><div class="zh">艾倫報報</div><div class="en">ALLEN I³ AURORA</div></div>
  </div>
  <div class="mono"><span class="a">A</span><span class="i">I<sup>3</sup></span><span class="a">A</span></div>
</body></html>
