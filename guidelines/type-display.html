<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--night-900);}
  .disp{font-family:var(--font-display);font-weight:900;letter-spacing:var(--ls-tight);line-height:1.05;color:var(--text-1);}
  .warm{background-image:linear-gradient(120deg,#3DDC97 0%,#2DD4BF 50%,#4F7BF0 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .sub{color:var(--text-2);font-weight:800;opacity:.92;}
  .sub .dot{color:var(--aurora-teal);opacity:.85;}
  .meta{font:600 11px/1 var(--font-mono);color:var(--text-3);margin-top:12px;}
</style></head>
<body>
<div class="disp warm" style="font-size:var(--text-6xl)">艾倫報報 I³</div>
<div class="disp sub" style="font-size:var(--text-4xl);margin-top:6px">Insight <span class="dot">·</span> Intelligence <span class="dot">·</span> Illumination</div>
<div class="meta">--font-display · Nunito 900 · text-6xl 84px / text-4xl 48px · letter-spacing -0.02em</div>
</body></html>
