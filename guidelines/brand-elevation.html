<!-- @dsCard group="Brand" viewport="700x180" name="Elevation & glow" subtitle="Cool shadows on night + aurora glow moments" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--night-900);display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .b{width:120px;height:80px;border-radius:var(--radius-lg);background:var(--night-800);border:1px solid var(--border);display:grid;place-items:center;font:600 11px var(--font-mono);color:var(--text-3);}
  .glow{background:var(--night-800);border:1px solid var(--border-aurora);color:var(--text-1);}
</style></head>
<body>
<div class="b" style="box-shadow:var(--shadow-sm)">shadow-sm</div>
<div class="b" style="box-shadow:var(--shadow-card)">shadow-card</div>
<div class="b" style="box-shadow:var(--shadow-lg)">shadow-lg</div>
<div class="b glow" style="box-shadow:var(--glow-brand)">glow-brand</div>
<div class="b glow" style="box-shadow:var(--glow-intelligence)">glow-intel</div>
</body></html>
